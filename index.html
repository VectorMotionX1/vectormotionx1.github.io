<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Motion</title>
  <meta name="description" content="Vector Motion - a simple GitHub Pages website." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b14;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f7fbff;
      --muted: #a8b3c7;
      --accent: #63e6be;
      --accent-2: #7c5cff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 92, 255, 0.35), transparent 28rem),
        radial-gradient(circle at 80% 15%, rgba(99, 230, 190, 0.22), transparent 24rem),
        linear-gradient(135deg, #080b14 0%, #11182a 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .motion-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(115deg, transparent 0 45%, rgba(99, 230, 190, 0.55) 46%, transparent 47% 100%),
        linear-gradient(115deg, transparent 0 58%, rgba(124, 92, 255, 0.6) 59%, transparent 60% 100%);
      background-size: 180px 180px, 260px 260px;
      animation: drift 16s linear infinite;
    }

    @keyframes drift {
      from { transform: translate3d(-80px, -80px, 0); }
      to { transform: translate3d(80px, 80px, 0); }
    }

    main {
      width: min(920px, calc(100% - 32px));
      padding: 56px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 32px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(99, 230, 190, 0.14);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 22px 0 14px;
      font-size: clamp(3rem, 9vw, 7rem);
      line-height: 0.92;
      letter-spacing: -0.08em;
    }

    p {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 14px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #051014;
      box-shadow: 0 16px 36px rgba(99, 230, 190, 0.22);
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    footer {
      margin-top: 46px;
      color: rgba(255, 255, 255, 0.46);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      main { padding: 34px 24px; border-radius: 24px; }
      .actions { flex-direction: column; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="motion-lines" aria-hidden="true"></div>
  <main>
    <span class="badge">● Live on GitHub Pages</span>
    <h1>Vector Motion</h1>
    <p>
      A clean starter website for vectormotion.github.io. This page is hosted for free with GitHub Pages and can be expanded into a portfolio, product page, demo site, or app landing page.
    </p>
    <div class="actions">
      <a class="button" href="https://github.com/damifan2016/vectormotion.github.io">View Repository</a>
      <a class="button secondary" href="mailto:hello@example.com">Contact</a>
    </div>
    <footer>© <span id="year"></span> Vector Motion. Built with HTML + CSS.</footer>
  </main>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
